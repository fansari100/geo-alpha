apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoalpha-api
  namespace: geoalpha
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: geoalpha-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: geoalpha-api
    spec:
      securityContext:
        runAsUser: 10001
        runAsNonRoot: true
      containers:
        - name: api
          image: geoalpha/api:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8000, name: http }]
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits:   { cpu: 1000m, memory: 1Gi }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: geoalpha-api
  namespace: geoalpha
spec:
  selector: { app.kubernetes.io/name: geoalpha-api }
  ports: [{ port: 8000, targetPort: http, name: http }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: geoalpha-api
  namespace: geoalpha
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: geoalpha-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
