apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoalpha-web
  namespace: geoalpha
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: geoalpha-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: geoalpha-web
    spec:
      containers:
        - name: web
          image: geoalpha/web:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: GATEWAY_URL
              value: http://geoalpha-api:8000
            - name: SERVICE_URL
              value: http://geoalpha-service:8080
          ports: [{ containerPort: 5173, name: http }]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 200m, memory: 384Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: geoalpha-web
  namespace: geoalpha
spec:
  selector: { app.kubernetes.io/name: geoalpha-web }
  ports: [{ port: 80, targetPort: http, name: http }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: geoalpha
  namespace: geoalpha
spec:
  rules:
    - host: geoalpha.local
      http:
        paths:
          - path: /api/missions
            pathType: Prefix
            backend: { service: { name: geoalpha-service, port: { number: 8080 } } }
          - path: /api/quant
            pathType: Prefix
            backend: { service: { name: geoalpha-api, port: { number: 8000 } } }
          - path: /api/health
            pathType: Prefix
            backend: { service: { name: geoalpha-api, port: { number: 8000 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: geoalpha-web, port: { number: 80 } } }
