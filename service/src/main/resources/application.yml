server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: geoalpha-service
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    io.geoalpha: INFO

geoalpha:
  api:
    base-url: ${GEOALPHA_API_BASE_URL:http://localhost:8000}
