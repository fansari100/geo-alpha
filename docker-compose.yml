services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: geoalpha/api:dev
    container_name: geoalpha-api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [galpha]

  service:
    build:
      context: ./service
      dockerfile: Dockerfile
    image: geoalpha/service:dev
    container_name: geoalpha-service
    depends_on:
      api:
        condition: service_healthy
    environment:
      GEOALPHA_API_BASE_URL: http://api:8000
      JAVA_OPTS: "-XX:+UseG1GC -XX:MaxRAMPercentage=70"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [galpha]

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: geoalpha/web:dev
    container_name: geoalpha-web
    depends_on:
      api:
        condition: service_healthy
      service:
        condition: service_healthy
    environment:
      GATEWAY_URL: http://api:8000
      SERVICE_URL: http://service:8080
    ports:
      - "5173:5173"
    networks: [galpha]

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: geoalpha-prom
    volumes:
      - ./infra/grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"
    ports:
      - "9090:9090"
    networks: [galpha]

networks:
  galpha:
    driver: bridge
